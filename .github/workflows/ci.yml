# Phase 4/5: continuous integration for the public monorepo.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: cargo test / compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # Must be >= 1.88 (ar_archive_writer); root rust-toolchain.toml pins 1.88
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - name: System deps (simplicity-sys / SSL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config libssl-dev clang cmake
      - uses: Swatinem/rust-cache@v2
      - name: rustc version
        run: rustc --version && cargo --version
      - name: cargo test (workspace libs)
        run: |
          cargo test -p lab-core -p lab-api -p lab-rgb -p lab-simplicity --lib
      - name: cargo build lab-cli
        run: cargo build -p lab-cli
      - name: public artifacts present
        run: |
          test -f artifacts/public/manifest.json
          test -f artifacts/public/s3-rgbmvp-live.json
          python3 -c "import json; json.load(open('artifacts/public/manifest.json'))"

  gitleaks:
    name: secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python:
    name: pytest (optional glue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q
