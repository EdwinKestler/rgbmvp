# Optional: deploy static public face to Vercel on main.
# Requires secrets.VERCEL_TOKEN, secrets.VERCEL_ORG_ID, secrets.VERCEL_PROJECT_ID
name: deploy-vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "artifacts/public/**"
      - "deploy/vercel.json"
      - ".github/workflows/deploy-vercel.yml"

jobs:
  deploy:
    # Skip quietly when Vercel secrets are not configured (GitHub forbids
    # secrets.* in job-level if on some paths; use a soft check in a step).
    runs-on: ubuntu-latest
    environment: public-demo
    steps:
      - name: Require Vercel secrets
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN not set — skipping deploy (configure repo secrets to enable)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
      - name: Stage static public root
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public
          cp -r web/* public/
          mkdir -p public/artifacts/public
          cp -r artifacts/public/* public/artifacts/public/
          # Root copies so status.html CANDIDATES resolve on Vercel
          cp artifacts/public/manifest.json public/manifest.json
          cp deploy/vercel.json vercel.json
      - uses: amondnet/vercel-action@v25
        if: steps.gate.outputs.skip != 'true'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
