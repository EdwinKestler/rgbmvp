# Cloud Run service sketch (U4 public read-only labd).
# Deploy after building/pushing the image to Artifact Registry or GHCR.
#
# Example:
#   gcloud auth login
#   gcloud config set project YOUR_PROJECT
#   gcloud services enable run.googleapis.com artifactregistry.googleapis.com
#   gcloud builds submit --tag REGION-docker.pkg.dev/PROJECT/rgbmvp/rgbmvp-public:latest -f Dockerfile.public
#   gcloud run services replace deploy/cloudrun.yaml --region=REGION
#
# Or one-shot:
#   gcloud run deploy rgbmvp-public \
#     --image=REGION-docker.pkg.dev/PROJECT/rgbmvp/rgbmvp-public:latest \
#     --region=REGION \
#     --allow-unauthenticated \
#     --min-instances=0 \
#     --max-instances=2 \
#     --memory=512Mi \
#     --cpu=1 \
#     --set-env-vars=LABD_PUBLIC_READ_ONLY=1,RGBMVP_NETWORK=liquid-testnet \
#     --set-env-vars=LABD_CORS_ORIGINS=https://YOUR_VERCEL_DOMAIN

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rgbmvp-public
  annotations:
    run.googleapis.com/description: "rgbmvp U4 public read-only labd"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT/rgbmvp/rgbmvp-public:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: LABD_PUBLIC_READ_ONLY
              value: "1"
            - name: RGBMVP_NETWORK
              value: liquid-testnet
            - name: LABD_WEB_DIR
              value: /app/web
            - name: RGBMVP_DATA_DIR
              value: /tmp/rgbmvp-public
            # Set after Vercel domain is known:
            # - name: LABD_CORS_ORIGINS
            #   value: https://your-app.vercel.app
            # Optional: allow authenticated mutations from operators only
            # - name: LABD_API_TOKEN
            #   valueFrom:
            #     secretKeyRef: ...
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
